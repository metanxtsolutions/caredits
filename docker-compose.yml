services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: caredits
      POSTGRES_PASSWORD: caredits
      POSTGRES_DB: caredits
    ports:
      - "5432:5432"
    volumes:
      - caredits_pgdata:/var/lib/postgresql/data

  web:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://caredits:caredits@db:5432/caredits"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    ports:
      - "3000:3000"

volumes:
  caredits_pgdata:
